<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Image Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Image Converter & Compressor</h1>
            <p>Optimize and convert your images instantly.</p>
        </header>

        <main>
            <!-- Interactive Upload Area -->
            <div class="drop-zone" id="drop-zone">
                <span class="drop-icon">📁</span>
                <h3>Drag & Drop your images here</h3>
                <p>or</p>
                <label for="file-input" class="browse-btn">Browse Files</label>
                <input type="file" id="file-input" multiple accept="image/*" hidden>
            </div>

            <!-- Settings Panel -->
            <div class="settings-panel">
                <div class="setting-group">
                    <label for="format-select">Convert To:</label>
                    <select id="format-select" class="modern-select">
                        <option value="image/jpeg">JPG</option>
                        <option value="image/png">PNG</option>
                        <option value="image/webp">WebP</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label for="quality-slider">Compression Quality:</label>
                    <input type="range" id="quality-slider" min="0.1" max="1" step="0.1" value="0.8" class="modern-slider">
                </div>
            </div>

            <!-- Action Area -->
            <button id="convert-btn" class="primary-btn">Process Images</button>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
